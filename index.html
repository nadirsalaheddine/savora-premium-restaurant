<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savora | Ultra Luxury Dining</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">SAVORA</div>
        <button id="cart-btn" class="cart-toggle">BAG (0)</button>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Culinary<br>Excellence</h1>
            <p>A refined taste for the elite.</p>
            <a href="#menu" class="btn-primary">Discover Menu</a>
        </div>
    </section>

    <section id="menu" class="menu-section">
        <h2 class="section-title">The Collection</h2>
        <div class="grid" id="menu-grid">
            </div>
    </section>

    <div id="cart-overlay" class="overlay hidden">
        <div class="cart-panel">
            <div class="cart-header">
                <h3>Your Bag</h3>
                <button id="close-cart" class="btn-close">Close</button>
            </div>
            <div id="cart-items" class="cart-items"></div>
            <div class="cart-footer">
                <button id="checkout-btn" class="btn-primary" style="width:100%">Proceed to Checkout</button>
            </div>
        </div>
    </div>

    <div id="checkout-overlay" class="overlay hidden">
        <div class="modal-panel">
            <h3>Secure Checkout</h3>
            <form id="checkout-form">
                <input type="text" placeholder="Full Name" required>
                <input type="tel" placeholder="Phone Number" required>
                <input type="text" placeholder="Delivery Address" required>
                <button type="submit" class="btn-primary" style="width:100%; margin-bottom: 10px;">Place Order</button>
                <button type="button" id="cancel-checkout" class="btn-secondary" style="width:100%">Cancel</button>
            </form>
        </div>
    </div>

    <div id="success-overlay" class="overlay hidden">
        <div class="modal-panel text-center">
            <h3 style="color: #D4AF37; margin-bottom: 15px;">Order Confirmed</h3>
            <p style="margin-bottom: 25px;">Thank you. Our chefs are preparing your masterpiece.</p>
            <button id="close-success" class="btn-primary">Return Home</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
